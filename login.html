<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Moodie</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="login-container">
    <h1>Moodie</h1>
    <p id="formTitle">Silakan login untuk melanjutkan</p>

    <form id="authForm">
      <input type="text" id="username" placeholder="Username" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit" id="submitBtn">Login</button>
    </form>

    <p id="authMessage"></p>

    <p class="switch-text">
      <span id="toggleText">Belum punya akun?</span>
      <button onclick="toggleMode()" id="toggleButton">Daftar di sini</button>
    </p>
  </div>

  <script>
    let isLoginMode = true;

    function toggleMode() {
      isLoginMode = !isLoginMode;
      document.getElementById("formTitle").textContent = isLoginMode
        ? "Silakan login untuk melanjutkan"
        : "Daftar akun baru";
      document.getElementById("submitBtn").textContent = isLoginMode
        ? "Login"
        : "Daftar";
      document.getElementById("toggleText").textContent = isLoginMode
        ? "Belum punya akun?"
        : "Sudah punya akun?";
      document.getElementById("toggleButton").textContent = isLoginMode
        ? "Daftar di sini"
        : "Login di sini";
      document.getElementById("authMessage").textContent = "";
    }

    document.getElementById("authForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const messageEl = document.getElementById("authMessage");

      if (!username || !password) {
        messageEl.style.color = "red";
        messageEl.textContent = "Username dan password tidak boleh kosong!";
        return;
      }

      const endpoint = isLoginMode ? '/login' : '/register';

      try {
        messageEl.style.color = "orange";
        messageEl.textContent = "Memproses...";

        const response = await fetch(`http://localhost:5000/api/auth${endpoint}`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json' 
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          messageEl.style.color = "green";
          
          if (isLoginMode) {
            messageEl.textContent = `Login berhasil! Selamat datang ${data.username || username}.`;
            
            // 1. Simpan session token, username, dan role dari backend ke localStorage
            localStorage.setItem("token", data.token);
            localStorage.setItem("emosyncUser", data.username || username);
            localStorage.setItem("role", data.role || "user"); // Menyimpan role ("user" / "admin")

            // 2. Pengalihan Halaman Otomatis Berdasarkan Role setelah 1 detik
            setTimeout(() => {
              if (data.role === "admin") {
                window.location.href = "admin.html"; // Jika admin, masuk ke Dashboard Admin terpisah
              } else {
                window.location.href = "index.html";  // Jika user biasa, masuk ke Dashboard Utama
              }
            }, 1000);

          } else {
            messageEl.textContent = "Pendaftaran berhasil! Sekarang silakan login.";
            // Balikkan form ke mode login otomatis agar user tinggal mengetik ulang
            toggleMode();
          }
        } else {
          throw new Error(data.error || "Terjadi kesalahan pada server.");
        }
      } catch (err) {
        messageEl.style.color = "red";
        messageEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
